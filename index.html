<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NEON-DRIFT">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23000' width='180' height='180'/><circle cx='90' cy='90' r='70' fill='%2300f2ff' opacity='0.3'/><circle cx='90' cy='90' r='50' fill='%2300f2ff' opacity='0.6'/><circle cx='90' cy='90' r='30' fill='%23ff0055'/></svg>">
    <title>NEON-DRIFT 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Courier New', monospace;
            width: 100vw;
            height: 100vh;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #00f2ff;
            pointer-events: none;
            text-shadow: 0 0 10px #00f2ff;
            z-index: 100;
            font-weight: bold;
        }
        #status {
            font-size: 10px;
            opacity: 0.7;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        #score { 
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 3px;
        }
        #overlay {
            position: fixed;
            bottom: 30px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            letter-spacing: 2px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="status">⚡ NEURAL LINK: ACTIVE</div>
        <div id="score">0000</div>
    </div>
    <div id="overlay">DRAG TO STEER • TAP TO PLAY</div>

    <script>
        let scene, camera, renderer, tunnel, particles;
        let score = 0;
        let mouseX = 0, mouseY = 0;
        let gameActive = true;

        function init() {
            // Scene Setup
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(
                75, 
                window.innerWidth / window.innerHeight, 
                0.1, 
                1000
            );
            camera.position.z = 5;

            // Renderer
            renderer = new THREE.WebGLRenderer({ 
                antialias: true,
                alpha: true,
                powerPreference: 'high-performance'
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setClearColor(0x000000, 1);
            document.body.appendChild(renderer.domElement);

            // Tunnel Geometry
            const geometry = new THREE.CylinderGeometry(5, 5, 100, 32, 50, true);
            const material = new THREE.MeshBasicMaterial({
                color: 0x00f2ff,
                wireframe: true,
                transparent: true,
                opacity: 0.2
            });
            tunnel = new THREE.Mesh(geometry, material);
            tunnel.rotation.x = Math.PI / 2;
            scene.add(tunnel);

            // Particles
            const pGeometry = new THREE.BufferGeometry();
            const pCount = 500;
            const posArray = new Float32Array(pCount * 3);
            for(let i = 0; i < pCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 10;
            }
            pGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const pMaterial = new THREE.PointsMaterial({ 
                size: 0.02, 
                color: 0xff0055,
                sizeAttenuation: true
            });
            particles = new THREE.Points(pGeometry, pMaterial);
            scene.add(particles);

            animate();
        }

        // Mouse & Touch Controls
        document.addEventListener('mousemove', (e) => {
            if(!gameActive) return;
            mouseX = (e.clientX / window.innerWidth) - 0.5;
            mouseY = (e.clientY / window.innerHeight) - 0.5;
        });

        document.addEventListener('touchmove', (e) => {
            if(!gameActive || e.touches.length === 0) return;
            e.preventDefault();
            mouseX = (e.touches[0].clientX / window.innerWidth) - 0.5;
            mouseY = (e.touches[0].clientY / window.innerHeight) - 0.5;
        }, { passive: false });

        document.addEventListener('click', () => {
            gameActive = true;
        });

        document.addEventListener('touchstart', () => {
            gameActive = true;
        });

        function animate() {
            requestAnimationFrame(animate);

            if(gameActive) {
                // Tunnel Movement
                tunnel.position.z += 0.2;
                if (tunnel.position.z > 20) tunnel.position.z = 0;

                // Tunnel Rotation
                tunnel.rotation.y += 0.01;

                // Camera Following
                camera.position.x += (mouseX * 5 - camera.position.x) * 0.05;
                camera.position.y += (-mouseY * 5 - camera.position.y) * 0.05;
                camera.lookAt(0, 0, -10);

                // Particles Rotation
                particles.rotation.z += 0.001;
                particles.rotation.x += 0.0005;

                // Score Update
                score += 1;
                document.getElementById('score').innerText = score.toString().padStart(4, '0');
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Prevent scrolling
        document.body.style.overflow = 'hidden';
        document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

        // Start Game
        init();
    </script>
</body>
</html>
